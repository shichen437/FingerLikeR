<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tauri + Vue + Typescript App</title>
        <style>
            #splash {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }

            #splash-icon {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 80px;
                height: 80px;
                border-radius: 999px;
            }

            #splash-icon img {
                width: 80px;
                height: 80px;
            }
        </style>
    </head>

    <body>
        <div id="splash">
            <div id="splash-icon">
                <img src="app-icon.png" alt="logo" />
            </div>
        </div>
        <div id="app"></div>
        <script type="module" src="/src/main.ts"></script>
        <script>
            window.addEventListener("load", () => {
                const splash = document.getElementById("splash");
                if (splash) {
                    splash.remove();
                }
            });
        </script>
    </body>
</html>
